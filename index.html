*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--surf);color:var(--os);-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
select,input{font-family:inherit;outline:none}
#wrap{max-width:420px;margin:0 auto}
#app{padding:0 12px 80px;min-height:100vh}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--sch);display:flex;border-radius:20px 20px 0 0;padding:0 4px 4px;border-top:1px solid var(--outv);z-index:100}
.ni{flex:1;padding:8px 4px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:500;color:var(--osv);cursor:pointer;font-family:inherit;border-radius:12px;border:none;background:none}
.ni .pill{width:56px;height:28px;border-radius:50px;display:flex;align-items:center;justify-content:center;font-size:20px}
.ni.on{color:var(--os)}.ni.on .pill{background:var(--sc)}
.card{background:var(--scl);border-radius:24px;overflow:hidden}
.btn-out{background:transparent;color:var(--p);border:1.5px solid var(--out);border-radius:50px;padding:10px 24px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn-fill{background:var(--p);color:var(--op);border:none;border-radius:50px;padding:10px 24px;font-size:14px;font-weight:500;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.ibt{width:36px;height:36px;border-radius:50px;background:var(--sch);color:var(--osv);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;border:none;font-size:16px}
.cbt{width:34px;height:34px;border-radius:50px;border:1.5px solid var(--outv);background:var(--scx);color:var(--os);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;cursor:pointer}
.cbt:disabled{opacity:.3;cursor:not-allowed}
.cval{font-size:17px;font-weight:500;min-width:24px;text-align:center}
.prog{height:4px;border-radius:2px;background:var(--sv);overflow:hidden}
.progb{height:100%;border-radius:2px;transition:width .4s,background .3s}
.selw{position:relative}
.selw select{width:100%;appearance:none;background:var(--scx);color:var(--os);border:1.5px solid var(--outv);border-radius:12px;padding:9px 30px 9px 11px;font-size:13px;font-family:inherit;cursor:pointer}
.selw select:focus{border-color:var(--p)}
.selw::after{content:"▾";position:absolute;right:9px;top:50%;transform:translateY(-50%);color:var(--osv);pointer-events:none}
.inp{width:100%;background:var(--scx);color:var(--os);border:1.5px solid var(--outv);border-radius:12px;padding:9px 11px;font-size:14px;font-family:inherit}
.inp:focus{border-color:var(--p)}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:50px;font-size:11px;font-weight:600}
.slbl{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--osv);margin:12px 0 7px;display:block}
.micon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.fb{background:var(--sc2);border-radius:12px;padding:11px;margin-bottom:7px}
.supp{background:var(--sc2);border-radius:20px;padding:11px;display:flex;align-items:flex-start;gap:9px;cursor:pointer;border:1.5px solid transparent;transition:border-color .2s}
.supp.on2{border-color:var(--p)}
.sck{width:18px;height:18px;border-radius:4px;border:2px solid var(--out);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;font-size:11px;color:#fff}
.supp.on2 .sck{background:var(--p);border-color:var(--p)}
.balc{background:var(--scl);border-radius:20px;padding:14px;margin-bottom:10px;cursor:pointer}
.trio{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:7px}
.trioc{background:var(--sc2);border-radius:12px;padding:9px;text-align:center}
.trioc.ov{background:var(--ec)}.trioc.un{background:var(--pc)}
.tlbl{font-size:10px;color:var(--osv);margin-bottom:2px;font-weight:500}
.tval{font-size:14px;font-weight:600}
.prow{display:flex;align-items:center;justify-content:space-between;padding:5px 0}
.prow+.prow{border-top:1px solid var(--outv)}
.cvp{overflow:hidden;touch-action:pan-y}
.ctr{display:flex;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.ctr.ntr{transition:none}
.csl{width:100%;flex-shrink:0}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cdow{text-align:center;font-size:11px;font-weight:500;color:var(--osv);padding:4px 0 8px}
.cday{border-radius:50px;padding:3px 2px 5px;min-height:48px;display:flex;flex-direction:column;align-items:center;gap:2px}
.cday.hd{cursor:pointer}
.cday.sel{background:var(--pc)}.cday.sel .dn{color:var(--opc)}
.cday.tod .dn{background:var(--p);color:var(--op);border-radius:50px;width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.dn{font-size:12px;font-weight:500;color:var(--osv);line-height:24px;width:24px;text-align:center}
.dk{font-size:10px;font-weight:600;text-align:center}
.det{border-radius:20px;padding:14px;margin-top:9px;background:var(--scl)}
.pkbx{background:var(--sc2);border-radius:20px;padding:12px;margin-bottom:10px}
.pkb{padding:5px 10px;border-radius:50px;border:1.5px solid var(--outv);background:var(--surf);color:var(--osv);font-size:12px;cursor:pointer;font-family:inherit}
.pkb.on{background:var(--p);color:var(--op);border-color:var(--p)}
@keyframes su{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.pe{animation:su .18s ease}
</style>

  if(pkOpen){const allDts=Object.keys(hm),minY=allDts.length?parseInt(allDts[0].slice(0,4)):cY-1;const yrs=[];for(let y=Math.min(minY,cY-2);y<=cY+1;y++)yrs.push(y);pk='<div class="pkbx"><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px">'+yrs.map(y=>'<button class="pkb '+(y===cY?'on':'')+'" onclick="pickY('+y+')">'+y+'</button>').join('')+'</div><div style="display:flex;gap:5px;flex-wrap:wrap">'+MONTHS.map((mn,i)=>'<button class="pkb '+(i===cM?'on':'')+'" onclick="pickMon('+i+')" style="flex:1;min-width:52px">'+mn.slice(0,3)+'</button>').join('')+'</div></div>';}
  const html=pk+'<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><button class="ibt" onclick="calPrev()">◀</button><div style="font-size:15px;font-weight:600;flex:1;cursor:pointer;display:flex;align-items:center;gap:5px" onclick="togPk()">'+MONTHS[cM]+' '+cY+' <span style="font-size:12px;color:var(--osv)">▼</span></div><button class="ibt" onclick="calNext()">▶</button></div><div class="cvp" id="cvp"><div class="ctr ntr" id="ctr" style="transform:translateX(-100%)"><div class="csl">'+bGrid(pn.y,pn.m)+'</div><div class="csl">'+bGrid(cY,cM)+'</div><div class="csl">'+bGrid(nn.y,nn.m)+'</div></div></div>';
  const outer=document.getElementById('cal-outer');
  if(outer){outer.innerHTML=html;requestAnimationFrame(()=>{setupCalSz();setupSw();});}
}
function setupCalSz(){const vp=document.getElementById('cvp'),tr=document.getElementById('ctr');if(!vp||!tr)return;const w=vp.offsetWidth;tr.querySelectorAll('.csl').forEach(s=>s.style.width=w+'px');tr.style.transform='translateX(-'+w+'px)';}
function setupSw(){const vp=document.getElementById('cvp');if(!vp||vp._sw)return;vp._sw=true;vp.addEventListener('touchstart',e=>{swX=e.touches[0].clientX;isSw=true;swD=0;document.getElementById('ctr')?.classList.add('ntr');},{passive:true});vp.addEventListener('touchmove',e=>{if(!isSw)return;swD=e.touches[0].clientX-swX;const tr=document.getElementById('ctr'),w=vp.offsetWidth;if(tr)tr.style.transform='translateX(calc(-'+w+'px + '+swD+'px))';},{passive:true});vp.addEventListener('touchend',()=>{if(!isSw)return;isSw=false;const tr=document.getElementById('ctr');tr?.classList.remove('ntr');if(swD<-50)navCal(1);else if(swD>50)navCal(-1);else{const w=document.getElementById('cvp')?.offsetWidth||0;if(tr)tr.style.transform='translateX(-'+w+'px)';}},{passive:true});}
function navCal(dir){const vp=document.getElementById('cvp'),tr=document.getElementById('ctr');if(!vp||!tr){chCal(dir);return;}const w=vp.offsetWidth,tx=dir>0?2*w:0;tr.classList.remove('ntr');tr.style.transform='translateX(-'+tx+'px)';tr.addEventListener('transitionend',()=>chCal(dir),{once:true});}
function chCal(dir){let m=cM+dir,y=cY;if(m<0){m=11;y--;}if(m>11){m=0;y++;}cM=m;cY=y;cSel=null;pkOpen=false;rCal();rDet();}
function calPrev(){navCal(-1);}function calNext(){navCal(1);}
function togBal(){balOpen=!balOpen;document.getElementById('app').innerHTML=bHistory();setTimeout(rCal,50);}
function togPk(){pkOpen=!pkOpen;rCal();}
function pickY(y){cY=y;cSel=null;rCal();}
function pickMon(m){cM=m;cSel=null;pkOpen=false;rCal();}
function pickDay(d){cSel=cSel===d?null:d;rCal();rDet();}
function rDet(){
  const el=document.getElementById('det-outer');if(!el)return;
  if(!cSel){el.innerHTML='';return;}
  const rec=hMap()[cSel];if(!rec){el.innerHTML='';return;}
  const goal=getPlan().kcal||1582,diff=rec.kcal-goal,dC=diff>0?'var(--err)':diff<0?'var(--p)':'var(--osv)',dS=diff>0?'+':'';
  const cC=rec.cum>0?'var(--err)':rec.cum<0?'var(--p)':'var(--osv)',cS=rec.cum>0?'+':'';
  const lbl=new Date(cSel+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  const pt=pTot();
  let h='<div class="det"><div style="display:flex;justify-content:space-between;margin-bottom:10px"><div><div style="font-size:13px;font-weight:500;text-transform:capitalize">'+lbl+'</div>'+(rec.hasOverage?'<div style="font-size:11px;color:var(--err);margin-top:2px">Incluyó Menú Extra</div>':'')+'</div><div style="font-size:11px;color:var(--osv)">acum. <b style="color:'+cC+'">'+cS+rec.cum+'</b></div></div>';
  h+='<div class="trio"><div class="trioc"><div class="tlbl">Consumido</div><div class="tval">'+rec.kcal+'</div></div><div class="trioc"><div class="tlbl">Objetivo</div><div class="tval" style="color:var(--osv)">'+goal+'</div></div><div class="trioc '+(diff>0?'ov':'un')+'"><div class="tlbl">Diferencial</div><div class="tval" style="color:'+dC+'">'+dS+diff+'</div></div></div>';
  [{e:'🌾',l:'Carbohidratos',k:'carb'},{e:'🥩',l:'Proteínas',k:'prot'},{e:'🥑',l:'Grasas',k:'fat'},{e:'🥦',l:'Vegetales',k:'veg'},{e:'🍎',l:'Frutas',k:'fruit'},{e:'🥛',l:'Lácteos',k:'dairy'}].forEach(g=>{const v=rec.totals?.[g.k]??0,t2=pt[g.k]||5,nc=v>t2?'var(--err)':v===t2?'var(--p)':'var(--osv)';h+='<div class="prow"><div style="display:flex;align-items:center;gap:7px"><span>'+g.e+'</span><span style="font-size:12px;color:var(--osv)">'+g.l+'</span></div><span style="font-size:12px;font-weight:600;color:'+nc+'">'+v+'/'+t2+'</span></div>';});
  el.innerHTML=h+'</div>';
}
function bProgress(){
  const ant=LS(V+'_an')||[],pl=getPlan(),lat=ant[ant.length-1],fst=ant[0];
  const wD=lat&&fst&&lat.peso&&fst.peso?(lat.peso-fst.peso).toFixed(1):null;
  let h='<div class="pe"><div style="font-size:19px;font-weight:500;padding:12px 0 4px">Progreso</div><div style="font-size:12px;color:var(--osv);margin-bottom:12px">Composición corporal</div>';
  if(wD!=null)h+='<div class="card" style="margin-bottom:10px;padding:13px"><div style="font-size:12px;font-weight:500;margin-bottom:8px">Evolución</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:7px"><div style="background:var(--sc2);border-radius:18px;padding:11px;text-align:center"><div style="font-size:22px;font-weight:700;color:'+(parseFloat(wD)<=0?'var(--p)':'var(--err)')+'">'+(parseFloat(wD)>0?'+':'')+wD+'</div><div style="font-size:11px;color:var(--osv);margin-top:2px">kg peso</div></div><div style="background:var(--sc2);border-radius:18px;padding:11px;text-align:center"><div style="font-size:22px;font-weight:700;color:var(--p)">'+ant.length+'</div><div style="font-size:11px;color:var(--osv);margin-top:2px">mediciones</div></div></div></div>';
  h+='<div class="card" style="margin-bottom:10px;padding:13px"><div style="font-size:12px;font-weight:500;margin-bottom:11px">Nueva medición</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  [['Peso (kg)','ap','0.1',pl.peso||84.2],['Cintura (cm)','ac','0.1','96.5'],['Cadera (cm)','ad','0.1','103.5'],['Brazo (cm)','ab','0.1','36.6'],['Muslo (cm)','am','0.1','60.5'],['% Grasa','ag','0.1','32.3']].forEach(([l,id,st,ph])=>{h+='<div><label style="font-size:10px;color:var(--osv);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:5px">'+l+'</label><input class="inp" type="number" id="'+id+'" step="'+st+'" placeholder="'+ph+'"></div>';});
  h+='</div><button class="btn-fill" onclick="saveAn()" style="margin-top:10px">📏 Guardar</button></div>';
  if(ant.length){h+='<span class="slbl">Historial</span>';ant.slice().reverse().forEach(r=>{h+='<div style="background:var(--sc2);border-radius:18px;padding:11px;margin-bottom:7px"><div style="font-size:11px;color:var(--osv);margin-bottom:7px">'+new Date(r.date+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short',year:'numeric'})+'</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">';[['peso','kg','Peso'],['cin','cm','Cintura'],['gra','%','% Grasa'],['cad','cm','Cadera'],['bra','cm','Brazo'],['mus','cm','Muslo']].filter(([k])=>r[k]).forEach(([k,u,l])=>{h+='<div><div style="font-size:14px;font-weight:600">'+r[k]+u+'</div><div style="font-size:10px;color:var(--osv)">'+l+'</div></div>';});h+='</div></div>';});}
  return h+'</div>';
}
function saveAn(){const fields=[['peso','ap'],['cin','ac'],['cad','ad'],['bra','ab'],['mus','am'],['gra','ag']];const rec={date:new Date().toISOString().slice(0,10)};let has=false;fields.forEach(([k,id])=>{const v=parseFloat(document.getElementById(id)?.value);if(!isNaN(v)){rec[k]=v;has=true;}});if(!has)return alert('Ingresa al menos un valor');const ant=LS(V+'_an')||[];const idx=ant.findIndex(r=>r.date===rec.date);if(idx>=0)ant[idx]=rec;else ant.push(rec);LS(V+'_an',ant);render();}
function bSetup(){const pl=getPlan();draftM={};MD.forEach(m=>{draftM[m.id]=(pl.meals?.[m.id]||[]).map(g=>({...g}));});return rSetupHTML(pl);}
function rSetupHTML(pl){
  const aIds=pl.supps||DP.supps;
  const sGrid=AS.map(su=>{const on=aIds.includes(su.id);return'<div onclick="togSetupS(\''+su.id+'\')" style="background:'+(on?'rgba(0,106,96,.1)':'var(--sc2)')+';border-radius:18px;padding:10px;cursor:pointer;border:1.5px solid '+(on?'var(--p)':'transparent')+'"><div style="display:flex;align-items:center;gap:7px;margin-bottom:3px"><span style="font-size:15px">'+su.e+'</span><span style="font-size:11px;font-weight:500;flex:1">'+su.n+'</span><div style="width:16px;height:16px;border-radius:3px;border:2px solid '+(on?'var(--p)':'var(--out)')+';background:'+(on?'var(--p)':'transparent')+';display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff">'+(on?'✓':'')+'</div></div><div style="font-size:10px;color:var(--osv)">'+su.d+'</div></div>';}).join('');
  const thOpts=['dark','light','system'].map(t=>{const lbs={dark:'🌙 Oscuro',light:'☀️ Claro',system:'💻 Auto'};const on=(pl.theme||'dark')===t;return'<button onclick="setTh(\''+t+'\')" style="flex:1;padding:8px 4px;border-radius:50px;font-size:11px;font-weight:500;border:1.5px solid '+(on?'var(--p)':'var(--outv)')+';background:'+(on?'rgba(0,106,96,.1)':'transparent')+';color:'+(on?'var(--p)':'var(--osv)')+';font-family:inherit;cursor:pointer">'+lbs[t]+'</button>';}).join('');
  let mBlks='';
  MD.forEach(m=>{
    const gs=draftM[m.id]||[];
    let rows='';
    gs.forEach((g,i)=>{const info=GM[g.k]||{e:'🍽',l:g.k};rows+='<div style="display:flex;align-items:center;gap:7px;margin-bottom:6px;background:var(--sc2);border-radius:10px;padding:8px 10px"><span>'+info.e+'</span><span style="font-size:12px;flex:1;font-weight:500">'+info.l+'</span><input type="number" value="'+g.t+'" min="0" max="20" onchange="updDraftT(\''+m.id+'\','+i+',this.value)" style="width:44px;text-align:center;font-size:14px;padding:4px 3px;border-radius:7px;border:1.5px solid var(--outv);background:var(--scx);color:var(--os);font-family:inherit"><button onclick="remDraftG(\''+m.id+'\','+i+')" style="width:24px;height:24px;border-radius:50px;background:var(--ec);border:none;display:flex;align-items:center;justify-content:center;color:var(--err);cursor:pointer;font-size:12px">✕</button></div>';});
    const used=gs.map(g=>g.k),avail=AG.filter(g=>!used.includes(g.k));
    const addOpts=avail.map(g=>'<option value="'+g.k+'">'+g.e+' '+g.l+'</option>').join('');
    const isOpenS=openSetup[m.id]!==false;
    mBlks+='<div class="card" style="margin-bottom:8px">';
    mBlks+='<div onclick="togSetupM(\''+m.id+'\')" style="padding:12px;cursor:pointer;display:flex;align-items:center;gap:8px">';
    mBlks+='<span style="font-size:19px">'+m.e+'</span><span style="font-size:14px;font-weight:500;flex:1;color:var(--os)">'+m.l+'</span>';
    mBlks+='<span style="font-size:11px;color:var(--osv)">'+( isOpenS?'▲':'▼')+'</span></div>';
    if(isOpenS) mBlks+='<div style="padding:0 12px 12px">'+rows+(rows?'':'<p style="font-size:12px;color:var(--osv);margin-bottom:8px;padding:7px;background:var(--sc2);border-radius:9px">Sin grupos</p>');
    if(avail.length)mBlks+='<div style="display:flex;gap:7px;align-items:center;margin-top:3px"><div class="selw" style="flex:1"><select id="addSel-'+m.id+'"><option value="">＋ Añadir grupo</option>'+addOpts+'</select></div><button onclick="addDraftG(\''+m.id+'\')" style="width:34px;height:34px;border-radius:50px;background:var(--p);border:none;display:flex;align-items:center;justify-content:center;color:var(--op);cursor:pointer;font-size:18px">＋</button></div>';
    else mBlks+='<p style="font-size:11px;color:var(--osv)">Todos los grupos añadidos</p>';
    if(isOpenS) mBlks+='</div>';
    mBlks+='</div>';
  });
  return '<div class="pe"><div style="font-size:19px;font-weight:500;padding:12px 0 3px">Configuración</div><div style="font-size:12px;color:var(--osv);margin-bottom:12px">Personaliza tu plan</div>'
    +'<div class="card" style="margin-bottom:9px;padding:13px"><div style="font-size:12px;font-weight:500;margin-bottom:10px">Datos personales</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="grid-column:1/-1"><label style="font-size:10px;color:var(--osv);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px">Nombre</label><input class="inp" type="text" id="s-name" value="'+(pl.name||'José Lamela')+'"></div><div><label style="font-size:10px;color:var(--osv);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px">Kcal objetivo</label><input class="inp" type="number" id="s-kcal" value="'+(pl.kcal||1582)+'"></div><div><label style="font-size:10px;color:var(--osv);font-weight:600;text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px">Peso inicial (kg)</label><input class="inp" type="number" id="s-peso" step="0.1" value="'+(pl.peso||84.2)+'"></div></div></div>'
    +'<div class="card" style="margin-bottom:9px;padding:13px"><div style="font-size:12px;font-weight:500;margin-bottom:9px">Tema</div><div style="display:flex;gap:7px">'+thOpts+'</div></div>'
    +'<div class="card" style="margin-bottom:9px;padding:13px"><div style="font-size:12px;font-weight:500;margin-bottom:3px">Suplementos</div><div style="font-size:11px;color:var(--osv);margin-bottom:8px">Selecciona los indicados</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">'+sGrid+'</div></div>'
    +'<span class="slbl">Grupos por comida</span>'+mBlks
    +'<button class="btn-fill" onclick="saveSetup()" style="margin-bottom:7px">💾 Guardar</button>'
    +'<button class="btn-out" onclick="resetPlan()">↺ Restaurar por defecto</button></div>';
}
function setTh(t){const pl=getPlan();pl.theme=t;LS(V+'_pl',pl);apTh(t);document.getElementById('app').innerHTML=rSetupHTML(pl);}
function togSetupM(id){openSetup[id]=openSetup[id]===false?true:false;document.getElementById('app').innerHTML=rSetupHTML(getPlan());}
function togSetupS(id){const pl=getPlan();if(!pl.supps)pl.supps=[...DP.supps];const i=pl.supps.indexOf(id);if(i>=0)pl.supps.splice(i,1);else pl.supps.push(id);LS(V+'_pl',pl);document.getElementById('app').innerHTML=rSetupHTML(pl);}
function addDraftG(mid){const sel=document.getElementById('addSel-'+mid);if(!sel||!sel.value)return;const k=sel.value;if(!draftM[mid])draftM[mid]=[];if(draftM[mid].some(g=>g.k===k))return;draftM[mid].push({k,t:1});document.getElementById('app').innerHTML=rSetupHTML(getPlan());}
function remDraftG(mid,idx){draftM[mid]?.splice(idx,1);document.getElementById('app').innerHTML=rSetupHTML(getPlan());}
function updDraftT(mid,idx,val){if(draftM[mid]?.[idx])draftM[mid][idx].t=Math.max(0,parseInt(val)||0);}
function saveSetup(){const pl={name:document.getElementById('s-name')?.value||'José Lamela',kcal:parseInt(document.getElementById('s-kcal')?.value)||1582,peso:parseFloat(document.getElementById('s-peso')?.value)||84.2,theme:getPlan().theme||'dark',supps:getPlan().supps||DP.supps,meals:{}};MD.forEach(m=>{pl.meals[m.id]=draftM[m.id]||[];});LS(V+'_pl',pl);go('today');}
function resetPlan(){if(!confirm('¿Restaurar?'))return;localStorage.removeItem(V+'_pl');go('today');}
go('today');
</script>
<div style="text-align:center;padding:16px 0 90px;font-size:11px;color:var(--osv);letter-spacing:.5px">Diseñado por <strong style="color:var(--p)">JL Design</strong></div>
