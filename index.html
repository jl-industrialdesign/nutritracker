<style>
/* ─── Color System ─────────────────────────────────────── */
:root {
  /* Surfaces */
  --bg:    #F2F2F7;   /* page background   */
  --s1:    #FFFFFF;   /* card level 1      */
  --s2:    #F7F7FC;   /* card level 2      */
  --s3:    #EFEFF5;   /* input / select    */

  /* Text */
  --t1:    #12122A;   /* primary           */
  --t2:    #45456A;   /* secondary         */
  --t3:    #9090B0;   /* tertiary / hint   */

  /* Dividers */
  --div:   rgba(0,0,0,.07);

  /* Accent — teal */
  --acc:   #00B09B;
  --acc2:  rgba(0,176,155,.12);

  /* Status */
  --grn:   #00C853;
  --grn2:  rgba(0,200,83,.12);
  --ora:   #FF8F00;
  --ora2:  rgba(255,143,0,.12);
  --red:   #F23450;
  --red2:  rgba(242,52,80,.10);

  /* Misc */
  --r:     10px;
  --r2:    16px;
  --fn:    -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --sh:    0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
}

[data-dark] {
  --bg:    #0D0D14;
  --s1:    #17171F;
  --s2:    #1F1F2A;
  --s3:    #272733;

  --t1:    #EEEEF5;
  --t2:    #9090B0;
  --t3:    #55556A;

  --div:   rgba(255,255,255,.06);

  --acc:   #00C9AF;
  --acc2:  rgba(0,201,175,.13);

  --grn:   #00E676;
  --grn2:  rgba(0,230,118,.12);
  --ora:   #FFB300;
  --ora2:  rgba(255,179,0,.13);
  --red:   #FF5370;
  --red2:  rgba(255,83,112,.12);

  --sh:    0 1px 3px rgba(0,0,0,.4), 0 4px 20px rgba(0,0,0,.35);
}

/* ─── Reset ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; -webkit-text-size-adjust: 100%; }
body { font-family: var(--fn); background: var(--bg); color: var(--t1); -webkit-font-smoothing: antialiased; transition: background .25s, color .25s; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
select, input { font-family: inherit; outline: none; }

/* ─── Layout ─────────────────────────────────────────────── */
#wrap { max-width: 430px; margin: 0 auto; }
#app  { padding: 0 0 90px; }

/* ─── Nav bar ────────────────────────────────────────────── */
.nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--s1);
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  display: flex;
  border-top: 1px solid var(--div);
  padding: 6px 0 max(8px, env(safe-area-inset-bottom));
  z-index: 100;
}
.ni {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 10px; font-weight: 500; color: var(--t3);
  cursor: pointer; border: none; background: none; font-family: inherit;
  padding: 2px 4px; letter-spacing: .3px; transition: color .15s;
}
.ni .pill { font-size: 22px; line-height: 1; margin-bottom: 1px; }
.ni.on { color: var(--acc); }

/* ─── Section label ──────────────────────────────────────── */
.slbl {
  display: block;
  font-size: 11px; font-weight: 700; letter-spacing: .8px;
  text-transform: uppercase; color: var(--t3);
  margin: 22px 16px 8px;
}

/* ─── iOS grouped list ───────────────────────────────────── */
.ios-group { background: var(--s1); border-radius: var(--r2); overflow: hidden; margin: 0 16px; box-shadow: var(--sh); }
.ios-row   { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--div); min-height: 48px; }
.ios-row:last-child { border-bottom: none; }

/* ─── Meal card ──────────────────────────────────────────── */
.meal-card {
  margin: 0 16px 10px;
  background: var(--s1);
  border-radius: var(--r2);
  overflow: hidden;
  box-shadow: var(--sh);
}
.meal-accent { height: 3px; }
.meal-hdr    { display: flex; align-items: center; padding: 14px 16px 10px; cursor: pointer; gap: 12px; }
.meal-icon   { width: 42px; height: 42px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.meal-prog   { padding: 0 16px 12px; }
.meal-body   { border-top: 1px solid var(--div); padding: 8px 0 4px; }

/* ─── Group row ──────────────────────────────────────────── */
.grp-hdr { display: flex; align-items: center; gap: 10px; padding: 10px 16px 5px; }
.grp-bar { margin: 0 16px 6px; height: 2px; border-radius: 1px; background: var(--div); overflow: hidden; }
.grp-fill { height: 100%; border-radius: 1px; transition: width .5s cubic-bezier(.4,0,.2,1), background .3s; }

/* ─── Food row ───────────────────────────────────────────── */
.food-row { padding: 6px 16px 10px; }
.food-sel {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px;
  background: var(--s2);
  border-radius: var(--r);
  border: 1px solid var(--div);
  margin-bottom: 7px;
}
.food-sel select {
  flex: 1; appearance: none; background: transparent; color: var(--t1);
  border: none; font-size: 14px; font-family: inherit; cursor: pointer;
  padding-right: 4px;
}
.food-sel select option { background: var(--s1); color: var(--t1); }
[data-dark] .food-sel select option { background: #1F1F2A; color: #EEEEF5; }
.food-chevron { color: var(--t3); font-size: 12px; flex-shrink: 0; }
.food-ctr { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* ─── Progress bar ───────────────────────────────────────── */
.prog  { height: 3px; border-radius: 2px; background: var(--div); overflow: hidden; }
.progb { height: 100%; border-radius: 2px; transition: width .5s cubic-bezier(.4,0,.2,1), background .3s; }

/* ─── Counter ────────────────────────────────────────────── */
.cbt {
  width: 30px; height: 30px; border-radius: 50%;
  border: none; background: var(--s3); color: var(--t1);
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; flex-shrink: 0; cursor: pointer;
  transition: transform .1s, background .1s;
}
.cbt:active  { transform: scale(.84); }
.cbt:disabled { opacity: .22; cursor: not-allowed; }
.cval { font-size: 17px; font-weight: 600; min-width: 30px; text-align: center; color: var(--t1); }

/* ─── Input ──────────────────────────────────────────────── */
.inp { width: 100%; background: var(--s3); color: var(--t1); border: none; border-radius: var(--r); padding: 11px 14px; font-size: 15px; font-family: inherit; }
.inp:focus { outline: 2px solid var(--acc); }

/* ─── Buttons ────────────────────────────────────────────── */
.btn-fill {
  background: var(--acc); color: #fff; border: none;
  border-radius: 50px; padding: 14px; font-size: 15px; font-weight: 600;
  font-family: inherit; cursor: pointer; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity .15s;
}
.btn-fill:active { opacity: .8; }
.btn-ghost {
  background: transparent; color: var(--acc); border: none;
  border-radius: 50px; padding: 13px; font-size: 15px; font-weight: 500;
  font-family: inherit; cursor: pointer; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-ghost-red {
  background: transparent; color: var(--red); border: none;
  border-radius: 50px; padding: 13px; font-size: 15px; font-weight: 400;
  font-family: inherit; cursor: pointer; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-add {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 9px 14px;
  background: var(--s2); color: var(--t2); border: none;
  border-radius: var(--r); font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer;
  border: 1px dashed var(--div);
  transition: background .15s;
}
.btn-add:active { background: var(--s3); }

/* ─── Tag ────────────────────────────────────────────────── */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 50px; font-size: 11px; font-weight: 600; }

/* ─── Icon button ────────────────────────────────────────── */
.ibt { width: 32px; height: 32px; border-radius: 50%; background: var(--s3); color: var(--t2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; border: none; font-size: 15px; }

/* ─── Supplement check ───────────────────────────────────── */
.sck { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--div); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: #fff; transition: all .2s; background: transparent; }
.supp-done .sck { background: var(--acc); border-color: var(--acc); }

/* ─── Calendar ───────────────────────────────────────────── */
.cvp { overflow: hidden; touch-action: pan-y; }
.ctr { display: flex; transition: transform .3s cubic-bezier(.4,0,.2,1); }
.ctr.ntr { transition: none; }
.csl { width: 100%; flex-shrink: 0; }
.cgrid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; padding: 0 16px; }
.cdow  { text-align: center; font-size: 11px; font-weight: 600; color: var(--t3); padding: 4px 0 8px; letter-spacing: .3px; }
.cday  { border-radius: 50px; padding: 3px 2px 5px; min-height: 48px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.cday.hd { cursor: pointer; }
.cday.hd:active { background: var(--s2); }
.cday.sel { background: var(--acc2); }
.cday.sel .dn { color: var(--acc); font-weight: 700; }
.cday.tod .dn { background: var(--acc); color: #fff; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; line-height: 1; }
.dn { font-size: 12px; font-weight: 400; color: var(--t2); line-height: 26px; width: 26px; text-align: center; }
.dk { font-size: 10px; font-weight: 700; text-align: center; }
.det { border-radius: var(--r2); padding: 16px; margin: 8px 16px 0; background: var(--s1); box-shadow: var(--sh); }

/* ─── Stats ──────────────────────────────────────────────── */
.trio  { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 8px; }
.trioc { background: var(--s2); border-radius: var(--r); padding: 10px; text-align: center; }
.trioc.ov { background: var(--red2); }
.trioc.un { background: var(--acc2); }
.tlbl { font-size: 10px; color: var(--t3); margin-bottom: 3px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase; }
.tval { font-size: 15px; font-weight: 700; color: var(--t1); }
.prow { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; }
.prow + .prow { border-top: 1px solid var(--div); }
.balc { background: var(--s1); border-radius: var(--r2); padding: 16px; margin: 0 16px 8px; cursor: pointer; box-shadow: var(--sh); }
.balbody { margin-top: 12px; border-top: 1px solid var(--div); padding-top: 12px; }
.pkbx { background: var(--s1); border-radius: var(--r2); padding: 14px; margin: 0 16px 10px; }
.pkb  { padding: 5px 12px; border-radius: 50px; border: 1px solid var(--div); background: var(--s2); color: var(--t2); font-size: 12px; cursor: pointer; font-family: inherit; }
.pkb.on { background: var(--acc); color: #fff; border-color: var(--acc); }

/* ─── Summary grid ───────────────────────────────────────── */
.sum-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--div); border-radius: var(--r2); overflow: hidden; margin: 0 16px; box-shadow: var(--sh); }
.sum-cell { background: var(--s1); padding: 14px 10px; }

/* ─── Anim ───────────────────────────────────────────────── */
@keyframes su { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.pe { animation: su .2s ease; }
/* Logo switching */
[data-dark] .logo-light { display: none !important; }
[data-dark] .logo-dark  { display: inline !important; }
html:not([data-dark]) .logo-dark  { display: none !important; }
html:not([data-dark]) .logo-light { display: inline !important; }
</style>
</head>
<body>
<div id="wrap">
  <div id="app"></div>
  <nav class="nav">
    <button class="ni on" id="nb-today" onclick="go('today')"><div class="pill">👁</div>Hoy</button>

function editDay(date){
  const rec=hMap()[date];
  if(!rec)return;
  const newKcal=prompt('Editar kcal para el '+new Date(date+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'long'})+':\nValor actual: '+rec.kcal+' kcal', rec.kcal);
  if(newKcal===null)return;
  const val=parseInt(newKcal);
  if(isNaN(val)||val<0){alert('Valor inválido');return;}
  const hist=LS(V+'_h')||[];
  const idx=hist.findIndex(r=>r.date===date);
  if(idx>=0){hist[idx].kcal=val;LS(V+'_h',hist);}
  document.getElementById('app').innerHTML=bHistory();
  setTimeout(rCal,50);
  setTimeout(()=>{ pickDay(date); },60);
}

const GD = {
  CLIENT_ID: '701665322979-hjanob31dbr6j8akk9814ta7gcqh57l6.apps.googleusercontent.com',
  SCOPES: 'https://www.googleapis.com/auth/drive.appdata',

  statusEl: null,

  init() {
    // Load GIS + gapi scripts
    if (typeof google === 'undefined' || !google.accounts) return;
    this.tokenClient = google.accounts.oauth2.initTokenClient({
      client_id: this.CLIENT_ID,
      scope: this.SCOPES,
      callback: (resp) => {
        if (resp.error) { GD.setStatus('❌ Error de autorización: ' + resp.error, 'red'); return; }

      }
    });
    const saved = LS(V+'_gd_token');
    if (saved) this.accessToken = saved;
  },

  setStatus(msg, color) {
    const el = document.getElementById('gd-status');
    if (el) { el.textContent = msg; el.style.color = color === 'green' ? 'var(--grn)' : color === 'red' ? 'var(--red)' : 'var(--t3)'; }
  },

  renderBtn() {
    const wrap = document.getElementById('gd-btn-wrap');

    if (this.accessToken) {
      wrap.innerHTML = `
        <button onclick="GD.backup()" class="btn-fill" style="margin-bottom:8px">☁️ Guardar backup en Drive</button>
        <button onclick="GD.restore()" style="width:100%;padding:13px;border-radius:50px;border:none;background:var(--s3);color:var(--t2);font-size:15px;font-weight:500;font-family:inherit;cursor:pointer;margin-bottom:8px">📥 Restaurar desde Drive</button>
        <button onclick="GD.disconnect()" style="width:100%;padding:10px;border-radius:50px;border:none;background:transparent;color:var(--t3);font-size:13px;font-family:inherit;cursor:pointer">Desconectar cuenta</button>`;
    } else {
      wrap.innerHTML = `<button onclick="GD.connect()" class="btn-fill">🔗 Conectar Google Drive</button>`;
    }
  },

  connect() {
    if (!this.tokenClient) {
      alert('La librería de Google no está cargada. Verifica tu conexión.');
      return;
    }
    this.tokenClient.requestAccessToken({ prompt: 'consent' });
  },

  disconnect() {
    if (this.accessToken && typeof google !== 'undefined') {
      google.accounts.oauth2.revoke(this.accessToken);
    }
    this.accessToken = null;
    try { localStorage.removeItem(V+'_gd_token'); } catch(e) {}
    delete _m[V+'_gd_token'];
    GD.setStatus('Desconectado', 'gray');
    GD.renderBtn();
  },

  getAllData() {
    // Collect all localStorage keys for this app
    const data = { version: 1, exported: new Date().toISOString(), keys: {} };
    try {
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(V)) {
          try { data.keys[k] = JSON.parse(localStorage.getItem(k)); } catch(e) { data.keys[k] = localStorage.getItem(k); }
        }
      }
    } catch(e) {}
    // Also include in-memory
    Object.keys(_m).forEach(k => { if (k.startsWith(V) && !data.keys[k]) data.keys[k] = _m[k]; });
    return data;
  },

  async findFile() {
    const r = await fetch(
      `https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${this.FILE_NAME}'&fields=files(id,name,modifiedTime)`,
      { headers: { Authorization: 'Bearer ' + this.accessToken } }
    );
    if (!r.ok) throw new Error('Error buscando archivo: ' + r.status);
    const d = await r.json();
    return d.files && d.files.length ? d.files[0] : null;
  },

  async backup() {
    if (!this.accessToken) { GD.connect(); return; }
    GD.setStatus('⏳ Guardando…', 'gray');
    try {
      const data = JSON.stringify(GD.getAllData(), null, 2);
      const existing = await GD.findFile();
      let url, method;
      if (existing) {
        url = `https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=multipart`;
        method = 'PATCH';
      } else {
        url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
        method = 'POST';
      }
      const meta = JSON.stringify({ name: GD.FILE_NAME, parents: existing ? undefined : ['appDataFolder'] });
      const boundary = 'nt_boundary_' + Date.now();
      const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${data}\r\n--${boundary}--`;
      const resp = await fetch(url, {
        method,
        headers: { Authorization: 'Bearer ' + GD.accessToken, 'Content-Type': `multipart/related; boundary=${boundary}` },
        body
      });
      if (!resp.ok) { const e = await resp.text(); throw new Error(e); }
      const now = new Date().toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
      GD.setStatus(`✅ Backup guardado a las ${now}`, 'green');
    } catch(e) {
      console.error('Drive backup error:', e);
      if (e.message.includes('401')) { GD.accessToken = null; GD.setStatus('⚠️ Sesión expirada. Reconecta.', 'red'); GD.renderBtn(); }
      else GD.setStatus('❌ Error al guardar: ' + e.message.slice(0,60), 'red');
    }
  },

  // Silent backup — no confirm, shows small toast instead of status bar
  async backupSilent() {
    if (!this.accessToken) return;
    try {
      const data = JSON.stringify(GD.getAllData(), null, 2);
      const existing = await GD.findFile();
      let url = existing
        ? `https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=multipart`
        : 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
      const method = existing ? 'PATCH' : 'POST';
      const meta = JSON.stringify({ name: GD.FILE_NAME, parents: existing ? undefined : ['appDataFolder'] });
      const boundary = 'nt_auto_' + Date.now();
      const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${data}\r\n--${boundary}--`;
      const resp = await fetch(url, {
        method,
        headers: { Authorization: 'Bearer ' + GD.accessToken, 'Content-Type': `multipart/related; boundary=${boundary}` },
        body
      });
      if (resp.ok) {
        LS(V+'_gd_last', new Date().toISOString());
        GD.showToast('☁️ Backup automático guardado');
      }
    } catch(e) { console.warn('Auto-backup failed:', e); }
  },

  showToast(msg) {
    let t = document.getElementById('gd-toast');
    if (!t) { t = document.createElement('div'); t.id = 'gd-toast'; t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 18px;border-radius:50px;font-size:13px;font-family:-apple-system,sans-serif;z-index:9999;pointer-events:none;transition:opacity .4s'; document.body.appendChild(t); }
    t.textContent = msg; t.style.opacity = '1';
    clearTimeout(t._hide); t._hide = setTimeout(() => t.style.opacity = '0', 2500);
  },

  async restore() {
    if (!this.accessToken) { GD.connect(); return; }
    if (!confirm('¿Restaurar datos desde Drive? Esto sobreescribirá los datos locales actuales.')) return;
    GD.setStatus('⏳ Restaurando…', 'gray');
    try {
      const file = await GD.findFile();
      if (!file) { GD.setStatus('⚠️ No se encontró backup en Drive.', 'red'); return; }
      const r = await fetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`, {
        headers: { Authorization: 'Bearer ' + GD.accessToken }
      });
      if (!r.ok) throw new Error('Error descargando: ' + r.status);
      const data = await r.json();
      if (!data.keys) throw new Error('Formato de backup inválido');
      Object.entries(data.keys).forEach(([k, v]) => { LS(k, v); });
      const dt = new Date(data.exported).toLocaleDateString('es-ES', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
      GD.setStatus(`✅ Restaurado (backup del ${dt})`, 'green');
      setTimeout(() => go('today'), 800);
    } catch(e) {
      console.error('Drive restore error:', e);
      if (e.message.includes('401')) { GD.accessToken = null; GD.setStatus('⚠️ Sesión expirada. Reconecta.', 'red'); GD.renderBtn(); }
      else GD.setStatus('❌ Error al restaurar: ' + e.message.slice(0,60), 'red');
    }
  }
};

// Load Google Identity Services script lazily
function loadGISScript() {
  if (document.getElementById('gis-script')) { GD.init(); return; }
  const s = document.createElement('script');

  s.src = 'https://accounts.google.com/gsi/client';

  document.head.appendChild(s);
}

  const pt=pTot();

function buildReportHTML(hist,goal,name,pt,from,to){
  const fmt=d=>new Date(d+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'});
  const fmtL=d=>new Date(d+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'});
  let tk=0,tc=0,tp=0,tf=0,tv=0,tfr=0,td=0,dOk=0,dOv=0;
  hist.forEach(r=>{
    tk+=r.kcal; tc+=r.totals?.carb||0; tp+=r.totals?.prot||0;
    tf+=r.totals?.fat||0; tv+=r.totals?.veg||0; tfr+=r.totals?.fruit||0; td+=r.totals?.dairy||0;
    r.kcal>goal*1.05?dOv++:dOk++;
  });
  const n=hist.length,aK=Math.round(tk/n),aC=(tc/n).toFixed(1),aP=(tp/n).toFixed(1),aF=(tf/n).toFixed(1);

  // Kcal bar chart
  function kcalChart(){
    const W=680,H=160,pad=30;
    const maxV=Math.max(...hist.map(r=>r.kcal),goal)*1.2;
    const scale=(H-30)/maxV;
    const bW=Math.max(4,Math.min(28,(W-pad*2)/hist.length-3));
    let bars='';
    hist.forEach((r,i)=>{
      const x=pad+(W-pad*2)/hist.length*i+(W-pad*2)/hist.length/2-bW/2;
      const h=Math.max(2,r.kcal*scale);
      const clr=r.kcal>goal*1.05?'#FF5370':r.kcal>goal*.88?'#FFB300':'#00BFA5';
      bars+=`<rect x="${x.toFixed(1)}" y="${(H-25-h).toFixed(1)}" width="${bW}" height="${h.toFixed(1)}" rx="3" fill="${clr}" opacity=".9"/>`;
      if(hist.length<=10) bars+=`<text x="${(x+bW/2).toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="8" fill="#aaa">${fmt(r.date)}</text>`;
    });
    const mY=(H-25-goal*scale).toFixed(1);
    return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
      ${bars}
      <line x1="${pad}" y1="${mY}" x2="${W-pad}" y2="${mY}" stroke="#FF5370" stroke-width="1.5" stroke-dasharray="5,4"/>
      <text x="${W-pad+2}" y="${parseFloat(mY)+4}" font-size="9" fill="#FF5370">${goal}</text>
    </svg>`;
  }

  // Macro sparklines
  function spark(data,meta,color){
    const W=120,H=40;
    const maxV=Math.max(...data,meta)*1.2||1;
    const pts=data.map((v,i)=>`${(i/(data.length-1||1)*(W-8)+4).toFixed(1)},${(H-4-(v/maxV)*(H-8)).toFixed(1)}`).join(' ');
    const metaY=(H-4-(meta/maxV)*(H-8)).toFixed(1);
    return `<svg viewBox="0 0 ${W} ${H}" style="width:80px;height:30px">
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round"/>
      <line x1="0" y1="${metaY}" x2="${W}" y2="${metaY}" stroke="${color}" stroke-width=".8" stroke-dasharray="3,2" opacity=".4"/>
    </svg>`;
  }

  // Detail table rows
  let rows='';
  hist.forEach(r=>{
    const diff=r.kcal-goal;
    const bg=r.kcal>goal*1.05?'#fff0f0':r.kcal>goal*.88?'#fffbf0':'#f0fff4';
    const dc=diff>0?'#FF5370':'#00C853';
    const ic=r.kcal>goal*1.05?'⚠️':r.kcal>goal*.88?'〜':'✅';
    const sc=r.kcal>goal*1.05?'#FF5370':r.kcal>goal*.88?'#FF8F00':'#00C853';

function showReportInline(html){
  document.getElementById('rep-overlay')?.remove();
  const ov=document.createElement('div');
  ov.id='rep-overlay';
  ov.style.cssText='position:fixed;inset:0;background:#fff;z-index:9999;overflow-y:auto';
  const toolbar=document.createElement('div');
  toolbar.style.cssText='position:sticky;top:0;background:#fff;padding:10px 16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center;z-index:1';
  const closeBtn=document.createElement('button');
  closeBtn.textContent='✕ Cerrar';
  closeBtn.style.cssText='border:none;background:#f5f5f5;font-size:15px;color:#888;cursor:pointer;font-family:inherit;padding:6px 12px;border-radius:8px';
  closeBtn.onclick=()=>ov.remove();
  const printBtn=document.createElement('button');
  printBtn.textContent='🖨️ Guardar PDF';
  printBtn.style.cssText='border:none;background:#00BFA5;color:#fff;font-size:14px;font-weight:600;cursor:pointer;padding:8px 18px;border-radius:50px;font-family:inherit';
  printBtn.onclick=()=>printReport();
  toolbar.appendChild(closeBtn);
  toolbar.appendChild(printBtn);
  const frame=document.createElement('iframe');
  frame.id='rep-frame';
  frame.style.cssText='width:100%;height:calc(100vh - 56px);border:none';
  ov.appendChild(toolbar);
  ov.appendChild(frame);
  document.body.appendChild(ov);
  // Use srcdoc to avoid sandbox issues
  setTimeout(()=>{ if(frame) frame.srcdoc=html; },100);
}

function printReport(){
  const frame=document.getElementById('rep-frame');
  if(!frame) return;
  // On Android/mobile: download as HTML file (can be opened and printed/shared)
  const isMobile=/Android|iPhone|iPad/i.test(navigator.userAgent);
  const html=frame.srcdoc||'';
  if(!html) return;
  if(isMobile){
    // Download file - user can open in browser and share
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;
    a.download='NutriTracker-Informe-'+new Date().toISOString().slice(0,10)+'.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    setTimeout(()=>alert('✓ Archivo descargado en tu carpeta de Descargas.\nÁbrelo en Chrome y usa Compartir → Imprimir → Guardar como PDF.'),500);
  } else {
    // Desktop: print dialog
    if(frame.contentWindow) frame.contentWindow.print();
    else window.print();
  }
}

    totalVeg+=(r.totals?.veg||0);
    totalFruit+=(r.totals?.fruit||0);
    totalDairy+=(r.totals?.dairy||0);
    if(r.kcal>goal*1.05)daysOver++;
    else daysOk++;
  });
  const n=hist.length;
  const avgKcal=Math.round(totalKcal/n);
  const avgCarb=(totalCarb/n).toFixed(1);
  const avgProt=(totalProt/n).toFixed(1);
  const avgFat=(totalFat/n).toFixed(1);
  
  // Bar chart SVG for kcal
  function barChart(data,meta,color,labelColor,unit,maxVal){
    const W=700,H=200,pad=40,barW=Math.max(4,Math.min(30,(W-pad*2)/data.length-4));
    const scale=(H-40)/(maxVal||Math.max(...data.map(d=>d.val),meta)*1.2);
    let bars='',labels='';
    data.forEach((d,i)=>{
      const x=pad+(W-pad*2)/data.length*i+(W-pad*2)/data.length/2-barW/2;
      const h=Math.max(2,d.val*scale);
      const y=H-30-h;
      const clr=d.val>meta*1.05?'#FF5370':d.val>meta*.88?'#FFB300':color;
      bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${h.toFixed(1)}" rx="3" fill="${clr}" opacity=".9"/>`;
      if(data.length<=14)labels+=`<text x="${(x+barW/2).toFixed(1)}" y="${H-8}" text-anchor="middle" font-size="9" fill="#888">${fmtShort(d.date)}</text>`;
    });
    // Meta line
    const metaY=(H-30-meta*scale).toFixed(1);
    const metaLine=`<line x1="${pad}" y1="${metaY}" x2="${W-pad}" y2="${metaY}" stroke="#FF5370" stroke-width="1.5" stroke-dasharray="6,4"/>`;
    const metaLbl=`<text x="${W-pad+4}" y="${parseFloat(metaY)+4}" font-size="10" fill="#FF5370">${meta}${unit}</text>`;
    return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">${bars}${metaLine}${metaLbl}${labels}</svg>`;
  }
  
  // Mini bar chart for macros
  function miniChart(data,meta,color,title,unit){
    const W=320,H=120,pad=20,barW=Math.max(3,Math.min(18,(W-pad*2)/data.length-3));
    const maxV=Math.max(...data.map(d=>d.val),meta)*1.3||1;
    const scale=(H-30)/maxV;
    let bars='',labels='';
    data.forEach((d,i)=>{
      const x=pad+(W-pad*2)/data.length*i+(W-pad*2)/data.length/2-barW/2;
      const h=Math.max(1,d.val*scale);
      const y=H-20-h;
      const clr=d.val>=meta?color:'#ccc';
      bars+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW}" height="${h.toFixed(1)}" rx="2" fill="${clr}"/>`;
    });
    const metaY=(H-20-meta*scale).toFixed(1);
    const metaLine=`<line x1="${pad}" y1="${metaY}" x2="${W-pad}" y2="${metaY}" stroke="${color}" stroke-width="1" stroke-dasharray="4,3" opacity=".5"/>`;
    return `<div style="background:#f8f8f8;border-radius:10px;padding:12px;flex:1;min-width:140px">
      <div style="font-size:11px;font-weight:700;color:#555;margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px">${title}</div>

// INFORME PROGRESO CORPORAL

function showProgressReport(){
  const ant=LS(V+'_an')||[];
  if(ant.length<1){alert('No hay mediciones registradas aún.');return;}
  const pl=getPlan(),name=pl.name||'José Lamela';
  const html=buildProgressHTML(ant,name);
  try{
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.target='_blank'; a.rel='noopener';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  } catch(e){ showReportInline(html); }
}

function buildProgressHTML(ant,name){
  const fmt=d=>new Date(d+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short',year:'numeric'});
  const fst=ant[0], lat=ant[ant.length-1];

  // Color for change: negative = green (reduction), positive = red for body fat/measures
  function chgClr(key,val,ref){
    if(!ref||val===undefined)return'#aaa';
    const d=val-ref;
    if(Math.abs(d)<0.1)return'#aaa';
    // For all body measures and fat%, lower is better
    return d<0?'#00C853':'#FF5370';
  }
  function arrow(val,ref){
    if(!ref||val===undefined||Math.abs(val-ref)<0.1)return'';
    return val<ref?' ↓':' ↑';
  }

  // Line chart for a given key
  function lineChart(key,label,color){
    const data=ant.filter(r=>r[key]!==undefined).map(r=>({d:r.date,v:r[key]}));
    if(data.length<1)return'';
    const W=300,H=80,pad=8;
    const vals=data.map(r=>r.v);
    const minV=Math.min(...vals),maxV=Math.max(...vals);
    const range=maxV-minV||1;
    const pts=data.map((r,i)=>{
      const x=pad+(W-pad*2)*(i/(data.length-1||1));
      const y=pad+(H-pad*2)*(1-(r.v-minV)/range);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    const dotsSVG=data.map((r,i)=>{
      const x=pad+(W-pad*2)*(i/(data.length-1||1));
      const y=pad+(H-pad*2)*(1-(r.v-minV)/range);
      return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="3" fill="${color}"/>`;
    }).join('');
    return `<div style="background:#f8f8f8;border-radius:8px;padding:10px 12px;flex:1;min-width:130px">
      <div style="font-size:10px;font-weight:700;color:#555;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px">${label}</div>
      <div style="display:flex;align-items:baseline;gap:6px;margin-bottom:4px">
        <span style="font-size:20px;font-weight:800;color:${color}">${lat[key]!==undefined?lat[key]:'—'}</span>
        ${fst[key]!==undefined&&lat[key]!==undefined?`<span style="font-size:12px;color:${chgClr(key,lat[key],fst[key])};font-weight:600">${(lat[key]-fst[key]>0?'+':'')+(lat[key]-fst[key]).toFixed(1)}${arrow(lat[key],fst[key])}</span>`:''}
      </div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto">
        <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
        ${dotsSVG}
      </svg>
    </div>`;
  }

  // Human silhouette SVG with annotations
  const hasPeso=lat.peso!==undefined, hasCin=lat.cin!==undefined;
  const hasCad=lat.cad!==undefined, hasBra=lat.bra!==undefined;
  const hasGra=lat.gra!==undefined, hasMus=lat.mus!==undefined;

  function annot(label,val,ref,x,y,side){
    if(val===undefined)return'';
    const d=ref?((val-ref)>0?'+':'')+(val-ref).toFixed(1):null;
    const clr=ref?chgClr('x',val,ref):'#555';
    const anchor=side==='right'?'start':'end';
    const lineX2=side==='right'?x+8:x-8;
    return `<line x1="${x}" y1="${y}" x2="${lineX2}" y2="${y}" stroke="${clr}" stroke-width="1"/>
    <text x="${side==='right'?lineX2+2:lineX2-2}" y="${y+4}" text-anchor="${anchor}" font-size="9" font-weight="700" fill="${clr}">${label}: ${val}${d?` (${d})`:''}</text>`;
  }

  const silhouette = `<svg viewBox="0 0 220 320" style="width:180px;height:auto;display:block;margin:0 auto">
    <!-- Body silhouette minimal -->
    <ellipse cx="110" cy="36" rx="18" ry="20" fill="#e0f2f1" stroke="#00796B" stroke-width="1.5"/>
    <path d="M88 56 Q76 80 74 120 Q72 155 78 185 Q85 215 82 260 L90 260 L95 195 L110 200 L125 195 L130 260 L138 260 Q135 215 142 185 Q148 155 146 120 Q144 80 132 56 Q120 52 110 52 Q100 52 88 56Z" fill="#e0f2f1" stroke="#00796B" stroke-width="1.5"/>
    <!-- Neck -->
    <rect x="104" y="54" width="12" height="8" rx="3" fill="#e0f2f1" stroke="#00796B" stroke-width="1"/>
    <!-- Arms -->
    <path d="M88 70 Q70 90 66 130 Q65 145 70 150" fill="none" stroke="#00796B" stroke-width="10" stroke-linecap="round"/>
    <path d="M132 70 Q150 90 154 130 Q155 145 150 150" fill="none" stroke="#00796B" stroke-width="10" stroke-linecap="round"/>

    <!-- Waist indicator -->
    ${hasCin?`<line x1="74" y1="138" x2="146" y2="138" stroke="#1B6EF3" stroke-width=".8" stroke-dasharray="3,2"/>
    ${annot('Cin',lat.cin,fst?.cin,74,138,'left')}
    ${annot('',lat.cin,fst?.cin,146,138,'right')}`:''}

    <!-- Hip indicator -->
    ${hasCad?`<line x1="78" y1="170" x2="142" y2="170" stroke="#7B3DB6" stroke-width=".8" stroke-dasharray="3,2"/>
    ${annot('Cad',lat.cad,fst?.cad,78,170,'left')}`:''}

    <!-- Arm indicator -->
    ${hasBra?`<line x1="60" y1="105" x2="75" y2="105" stroke="#D2720A" stroke-width=".8" stroke-dasharray="3,2"/>
    ${annot('Bra',lat.bra,fst?.bra,60,105,'left')}`:''}

    <!-- Thigh indicator -->
    ${hasMus?`<line x1="86" y1="230" x2="106" y2="230" stroke="#C44726" stroke-width=".8" stroke-dasharray="3,2"/>
    ${annot('Mus',lat.mus,fst?.mus,86,230,'left')}`:''}

    <!-- Weight top -->
    ${hasPeso?`<text x="110" y="14" text-anchor="middle" font-size="10" font-weight="800" fill="#00796B">${lat.peso} kg</text>
    ${fst?.peso?`<text x="110" y="25" text-anchor="middle" font-size="8" fill="${chgClr('x',lat.peso,fst.peso)}">${(lat.peso-fst.peso>0?'+':'')+(lat.peso-fst.peso).toFixed(1)} kg${arrow(lat.peso,fst.peso)}</text>`:''}`:'' }

    <!-- Fat % bottom -->
    ${hasGra?`<text x="110" y="285" text-anchor="middle" font-size="10" font-weight="800" fill="#FF8F00">${lat.gra}% grasa</text>
    ${fst?.gra?`<text x="110" y="295" text-anchor="middle" font-size="8" fill="${chgClr('x',lat.gra,fst.gra)}">${(lat.gra-fst.gra>0?'+':'')+(lat.gra-fst.gra).toFixed(1)}%${arrow(lat.gra,fst.gra)}</text>`:''}`:'' }
  </svg>`;

  // Table rows
  let trows='';
  ant.forEach((r,i)=>{
    const prev=i>0?ant[i-1]:null;
    function cell(key){
      if(r[key]===undefined)return '<td style="padding:5px 8px;text-align:center;border-bottom:1px solid #eee;font-size:11px;color:#ddd">—</td>';
      const d=prev&&prev[key]!==undefined?(r[key]-prev[key]):null;
      const clr=d?chgClr('x',r[key],prev[key]):'#333';
      const ar=d?arrow(r[key],prev[key]):'';
      return `<td style="padding:5px 8px;text-align:center;border-bottom:1px solid #eee;font-size:11px;color:${clr};font-weight:${i===ant.length-1?'700':'400'}">${r[key]}${ar}</td>`;
    }
    trows+=`<tr style="background:${i%2===0?'#fff':'#fafafa'}">
      <td style="padding:5px 8px;font-size:11px;border-bottom:1px solid #eee;white-space:nowrap">${fmt(r.date)}</td>
      ${cell('peso')}${cell('cin')}${cell('cad')}${cell('bra')}${cell('mus')}${cell('gra')}
    </tr>`;
  });

  const LOGO_B_LOCAL = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAJ0AAADvCAYAAADozNYcAAACc0lEQVR4nO3SMQEAIAzAsIF/z+CiHCQKenTNzBkI7dcB/Md05ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkTEfOdORMR8505ExHznTkLrWaAt1kYHCGAAAAAElFTkSuQmCC';

  return `<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Progreso Corporal — ${name}</title>
<style>

.hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #00BFA5}

table{width:100%;border-collapse:collapse}

th:first-child{text-align:left}
.ftr{text-align:center;margin-top:14px;padding-top:10px;border-top:1px solid #eee}
.print-btn{position:fixed;bottom:16px;right:16px;background:#00BFA5;color:#fff;border:none;padding:10px 20px;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 3px 14px rgba(0,191,165,.4);font-family:inherit}
@media print{.print-btn{display:none}body{padding:10px}}
</style></head><body>

<div class="hdr">
  <div>
    <h1 style="font-size:22px;font-weight:800;color:#00796B;letter-spacing:-1px">📏 Progreso Corporal</h1>
    <p style="font-size:11px;color:#999;margin-top:3px">${name} &nbsp;·&nbsp; ${fmt(fst.date)} al ${fmt(lat.date)} &nbsp;·&nbsp; ${ant.length} mediciones</p>
    <p style="font-size:11px;color:#999;margin-top:2px">Generado el ${new Date().toLocaleDateString('es-ES',{day:'numeric',month:'long',year:'numeric'})}</p>

</div>

<div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px">

    <div class="charts">
      ${lineChart('peso','Peso (kg)','#00796B')}
      ${lineChart('gra','% Grasa','#FF8F00')}

}
