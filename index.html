<style>
/* ─── Color System ─────────────────────────────────────── */
:root {
  /* Surfaces */
  --bg:    #F2F2F7;   /* page background   */
  --s1:    #FFFFFF;   /* card level 1      */
  --s2:    #F7F7FC;   /* card level 2      */
  --s3:    #EFEFF5;   /* input / select    */

  /* Text */
  --t1:    #12122A;   /* primary           */
  --t2:    #45456A;   /* secondary         */
  --t3:    #9090B0;   /* tertiary / hint   */

  /* Dividers */
  --div:   rgba(0,0,0,.07);

  /* Accent — teal */
  --acc:   #00B09B;
  --acc2:  rgba(0,176,155,.12);

  /* Status */
  --grn:   #00C853;
  --grn2:  rgba(0,200,83,.12);
  --ora:   #FF8F00;
  --ora2:  rgba(255,143,0,.12);
  --red:   #F23450;
  --red2:  rgba(242,52,80,.10);

  /* Misc */
  --r:     10px;
  --r2:    16px;
  --fn:    -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --sh:    0 1px 4px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.05);
}

[data-dark] {
  --bg:    #0D0D14;
  --s1:    #17171F;
  --s2:    #1F1F2A;
  --s3:    #272733;

  --t1:    #EEEEF5;
  --t2:    #9090B0;
  --t3:    #55556A;

  --div:   rgba(255,255,255,.06);

  --acc:   #00C9AF;
  --acc2:  rgba(0,201,175,.13);

  --grn:   #00E676;
  --grn2:  rgba(0,230,118,.12);
  --ora:   #FFB300;
  --ora2:  rgba(255,179,0,.13);
  --red:   #FF5370;
  --red2:  rgba(255,83,112,.12);

  --sh:    0 1px 3px rgba(0,0,0,.4), 0 4px 20px rgba(0,0,0,.35);
}

/* ─── Reset ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; -webkit-text-size-adjust: 100%; }
body { font-family: var(--fn); background: var(--bg); color: var(--t1); -webkit-font-smoothing: antialiased; transition: background .25s, color .25s; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
select, input { font-family: inherit; outline: none; }

/* ─── Layout ─────────────────────────────────────────────── */
#wrap { max-width: 430px; margin: 0 auto; }
#app  { padding: 0 0 90px; }

/* ─── Nav bar ────────────────────────────────────────────── */
.nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: var(--s1);
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  display: flex;
  border-top: 1px solid var(--div);
  padding: 6px 0 max(8px, env(safe-area-inset-bottom));
  z-index: 100;
}
.ni {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  font-size: 10px; font-weight: 500; color: var(--t3);
  cursor: pointer; border: none; background: none; font-family: inherit;
  padding: 2px 4px; letter-spacing: .3px; transition: color .15s;
}
.ni .pill { font-size: 22px; line-height: 1; margin-bottom: 1px; }
.ni.on { color: var(--acc); }

/* ─── Section label ──────────────────────────────────────── */
.slbl {
  display: block;
  font-size: 11px; font-weight: 700; letter-spacing: .8px;
  text-transform: uppercase; color: var(--t3);
  margin: 22px 16px 8px;
}

/* ─── iOS grouped list ───────────────────────────────────── */
.ios-group { background: var(--s1); border-radius: var(--r2); overflow: hidden; margin: 0 16px; box-shadow: var(--sh); }
.ios-row   { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--div); min-height: 48px; }
.ios-row:last-child { border-bottom: none; }

/* ─── Meal card ──────────────────────────────────────────── */
.meal-card {
  margin: 0 16px 10px;
  background: var(--s1);
  border-radius: var(--r2);
  overflow: hidden;
  box-shadow: var(--sh);
}
.meal-accent { height: 3px; }
.meal-hdr    { display: flex; align-items: center; padding: 14px 16px 10px; cursor: pointer; gap: 12px; }
.meal-icon   { width: 42px; height: 42px; border-radius: 13px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
.meal-prog   { padding: 0 16px 12px; }
.meal-body   { border-top: 1px solid var(--div); padding: 8px 0 4px; }

/* ─── Group row ──────────────────────────────────────────── */
.grp-hdr { display: flex; align-items: center; gap: 10px; padding: 10px 16px 5px; }
.grp-bar { margin: 0 16px 6px; height: 2px; border-radius: 1px; background: var(--div); overflow: hidden; }
.grp-fill { height: 100%; border-radius: 1px; transition: width .5s cubic-bezier(.4,0,.2,1), background .3s; }

/* ─── Food row ───────────────────────────────────────────── */
.food-row { padding: 6px 16px 10px; }
.food-sel {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px;
  background: var(--s2);
  border-radius: var(--r);
  border: 1px solid var(--div);
  margin-bottom: 7px;
}
.food-sel select {
  flex: 1; appearance: none; background: transparent; color: var(--t1);
  border: none; font-size: 14px; font-family: inherit; cursor: pointer;
  padding-right: 4px;
}
.food-sel select option { background: var(--s1); color: var(--t1); }
[data-dark] .food-sel select option { background: #1F1F2A; color: #EEEEF5; }
.food-chevron { color: var(--t3); font-size: 12px; flex-shrink: 0; }
.food-ctr { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

/* ─── Progress bar ───────────────────────────────────────── */
.prog  { height: 3px; border-radius: 2px; background: var(--div); overflow: hidden; }
.progb { height: 100%; border-radius: 2px; transition: width .5s cubic-bezier(.4,0,.2,1), background .3s; }

/* ─── Counter ────────────────────────────────────────────── */
.cbt {
  width: 30px; height: 30px; border-radius: 50%;
  border: none; background: var(--s3); color: var(--t1);
  display: flex; align-items: center; justify-content: center;
  font-size: 19px; flex-shrink: 0; cursor: pointer;
  transition: transform .1s, background .1s;
}
.cbt:active  { transform: scale(.84); }
.cbt:disabled { opacity: .22; cursor: not-allowed; }
.cval { font-size: 17px; font-weight: 600; min-width: 30px; text-align: center; color: var(--t1); }

/* ─── Input ──────────────────────────────────────────────── */
.inp { width: 100%; background: var(--s3); color: var(--t1); border: none; border-radius: var(--r); padding: 11px 14px; font-size: 15px; font-family: inherit; }
.inp:focus { outline: 2px solid var(--acc); }

/* ─── Buttons ────────────────────────────────────────────── */
.btn-fill {
  background: var(--acc); color: #fff; border: none;
  border-radius: 50px; padding: 14px; font-size: 15px; font-weight: 600;
  font-family: inherit; cursor: pointer; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity .15s;
}
.btn-fill:active { opacity: .8; }
.btn-ghost {
  background: transparent; color: var(--acc); border: none;
  border-radius: 50px; padding: 13px; font-size: 15px; font-weight: 500;
  font-family: inherit; cursor: pointer; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-ghost-red {
  background: transparent; color: var(--red); border: none;
  border-radius: 50px; padding: 13px; font-size: 15px; font-weight: 400;
  font-family: inherit; cursor: pointer; width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-add {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 9px 14px;
  background: var(--s2); color: var(--t2); border: none;
  border-radius: var(--r); font-size: 13px; font-weight: 500;
  font-family: inherit; cursor: pointer;
  border: 1px dashed var(--div);
  transition: background .15s;
}
.btn-add:active { background: var(--s3); }

/* ─── Tag ────────────────────────────────────────────────── */
.tag { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 50px; font-size: 11px; font-weight: 600; }

/* ─── Icon button ────────────────────────────────────────── */
.ibt { width: 32px; height: 32px; border-radius: 50%; background: var(--s3); color: var(--t2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; border: none; font-size: 15px; }

/* ─── Supplement check ───────────────────────────────────── */
.sck { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--div); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; color: #fff; transition: all .2s; background: transparent; }
.supp-done .sck { background: var(--acc); border-color: var(--acc); }

/* ─── Calendar ───────────────────────────────────────────── */
.cvp { overflow: hidden; touch-action: pan-y; }
.ctr { display: flex; transition: transform .3s cubic-bezier(.4,0,.2,1); }
.ctr.ntr { transition: none; }
.csl { width: 100%; flex-shrink: 0; }
.cgrid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; padding: 0 16px; }
.cdow  { text-align: center; font-size: 11px; font-weight: 600; color: var(--t3); padding: 4px 0 8px; letter-spacing: .3px; }
.cday  { border-radius: 50px; padding: 3px 2px 5px; min-height: 48px; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.cday.hd { cursor: pointer; }
.cday.hd:active { background: var(--s2); }
.cday.sel { background: var(--acc2); }
.cday.sel .dn { color: var(--acc); font-weight: 700; }
.cday.tod .dn { background: var(--acc); color: #fff; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; line-height: 1; }
.dn { font-size: 12px; font-weight: 400; color: var(--t2); line-height: 26px; width: 26px; text-align: center; }
.dk { font-size: 10px; font-weight: 700; text-align: center; }
.det { border-radius: var(--r2); padding: 16px; margin: 8px 16px 0; background: var(--s1); box-shadow: var(--sh); }

/* ─── Stats ──────────────────────────────────────────────── */
.trio  { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 8px; }
.trioc { background: var(--s2); border-radius: var(--r); padding: 10px; text-align: center; }
.trioc.ov { background: var(--red2); }
.trioc.un { background: var(--acc2); }
.tlbl { font-size: 10px; color: var(--t3); margin-bottom: 3px; font-weight: 600; letter-spacing: .3px; text-transform: uppercase; }
.tval { font-size: 15px; font-weight: 700; color: var(--t1); }
.prow { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; }
.prow + .prow { border-top: 1px solid var(--div); }
.balc { background: var(--s1); border-radius: var(--r2); padding: 16px; margin: 0 16px 8px; cursor: pointer; box-shadow: var(--sh); }
.balbody { margin-top: 12px; border-top: 1px solid var(--div); padding-top: 12px; }
.pkbx { background: var(--s1); border-radius: var(--r2); padding: 14px; margin: 0 16px 10px; }
.pkb  { padding: 5px 12px; border-radius: 50px; border: 1px solid var(--div); background: var(--s2); color: var(--t2); font-size: 12px; cursor: pointer; font-family: inherit; }
.pkb.on { background: var(--acc); color: #fff; border-color: var(--acc); }

/* ─── Summary grid ───────────────────────────────────────── */
.sum-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--div); border-radius: var(--r2); overflow: hidden; margin: 0 16px; box-shadow: var(--sh); }
.sum-cell { background: var(--s1); padding: 14px 10px; }

/* ─── Anim ───────────────────────────────────────────────── */
@keyframes su { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
.pe { animation: su .2s ease; }
</style>
</head>
<body>
<div id="wrap">
  <div id="app"></div>
  <nav class="nav">
    <button class="ni on" id="nb-today" onclick="go('today')"><div class="pill">👁</div>Hoy</button>
    <button class="ni" id="nb-history" onclick="go('history')"><div class="pill">📅</div>Historial</button>
    <button class="ni" id="nb-progress" onclick="go('progress')"><div class="pill">📈</div>Progreso</button>
    <button class="ni" id="nb-setup" onclick="go('setup')"><div class="pill">⚙️</div>Config</button>
  </nav>

const V='nt24';const _m={};
function LS(k,v){if(v===undefined){try{const r=localStorage.getItem(k);return r?JSON.parse(r):_m[k]??null}catch{return _m[k]??null}}try{localStorage.setItem(k,JSON.stringify(v))}catch{}_m[k]=v;}
function tdK(){return V+'_d_'+new Date().toISOString().slice(0,10)}
function spK(){return V+'_s_'+new Date().toISOString().slice(0,10)}
function getPlan(){return LS(V+'_pl')||DP}
function getMG(id){return getPlan().meals?.[id]||[]}
function getAS(){return AS.filter(s=>(getPlan().supps||DP.supps).includes(s.id))}
function getState(){const s=LS(tdK());if(s)return s;const e={};MD.forEach(m=>{e[m.id]={};getMG(m.id).forEach(g=>e[m.id][g.k]=[]);});e.extra=[];e.extraUnlocked=false;return e;}
function ensure(s,mid,k){if(!s[mid])s[mid]={};if(!Array.isArray(s[mid][k])||!s[mid][k].length)s[mid][k]=[{fi:-1,p:0}];}
function saveS(s){LS(tdK(),s);autoSave(s);}
function getSup(){return LS(spK())||{}}
function bfDT(s){return(s.breakfast?.dairy||[]).reduce((a,i)=>i.fi>=0?a+(i.p||0):a,0)}
function sg(s,m,k){const it=s[m]?.[k];if(!it)return 0;if(!Array.isArray(it))return it;if(k==='batido')return it.reduce((a,i)=>a+(i.p||0),0);return it.reduce((a,i)=>i.fi>=0?a+(i.p||0):a,0);}
function gkn(k){return k==='batido'?'prot':k}
function dTgt(gk){let t=0;MD.forEach(m=>(getPlan().meals?.[m.id]||[]).forEach(g=>{if(gkn(g.k)===gk)t+=g.t||0;}));return t}
function cOM(s,mid,gk){let t=0;MD.forEach(m=>{if(m.id===mid)return;getMG(m.id).forEach(g=>{if(gkn(g.k)===gk)t+=sg(s,m.id,g.k);});});return t}
function mxM(s,mid,gk){return Math.max(0,dTgt(gk)-cOM(s,mid,gk))}
function kk(k){return k==='batido'?KP.prot:KP[k]||0}
function eL(s){return Array.isArray(s.extra)?s.extra:[]}
function eMac(s){let c=0,p=0,f=0,k=0;eL(s).forEach(r=>{const it=EX[r.i];if(!it||!r.q)return;c+=it.c*r.q;p+=it.p*r.q;f+=it.f*r.q;k+=(it.p*KP.prot+it.c*KP.carb+it.f*KP.fat)*r.q;});return{carb:c,prot:p,fat:f,kcal:Math.round(k)};}
function eOvr(s){const em=eMac(s);let dc={carb:0,prot:0,fat:0};MD.forEach(m=>getMG(m.id).forEach(g=>{const k=gkn(g.k);if(dc[k]!=null)dc[k]+=sg(s,m.id,g.k);}));return(dc.carb+em.carb)>dTgt('carb')||(dc.prot+em.prot)>dTgt('prot')||(dc.fat+em.fat)>dTgt('fat');}
function allDone(s){return MD.every(m=>mProg(m,s)>=1)}
function eAlw(s){return!allDone(s)||s.extraUnlocked===true}
function getMM(m,s){let k=0,c=0,p=0,f=0;getMG(m.id).forEach(g=>{const items=Array.isArray(s[m.id]?.[g.k])?s[m.id][g.k]:[];if(g.k==='batido'){const v=items.reduce((a,i)=>a+(i.p||0),0);k+=v*KP.prot;p+=v*7;return;}const fl=FD[g.k]||[];items.forEach(item=>{if(item.fi<0||!item.p)return;const food=fl[item.fi];if(!food)return;k+=item.p*kk(g.k);c+=item.p*(food.carb||0);p+=item.p*(food.prot||0);f+=item.p*(food.fat||0);});});return{kcal:Math.round(k),carb:c,prot:p,fat:f};}
function cTot(s){const t={carb:0,prot:0,fat:0,veg:0,fruit:0,dairy:0};MD.forEach(m=>getMG(m.id).forEach(g=>{const mk=gkn(g.k);if(t[mk]!=null)t[mk]+=sg(s,m.id,g.k);}));const em=eMac(s);t.carb+=em.carb;t.prot+=em.prot;t.fat+=em.fat;return t;}
function cKcal(s){let k=0;MD.forEach(m=>getMG(m.id).forEach(g=>k+=sg(s,m.id,g.k)*kk(g.k)));return k+eMac(s).kcal;}
function mProg(m,s){if(m.id==='snack_pm'){const gs=getMG(m.id),hB=sg(s,'snack_pm','batido')>0,hFD=sg(s,'snack_pm','fruit')>0||sg(s,'snack_pm','dairy')>0;if(!hB&&!hFD)return 0;if(hB){const bG=gs.find(g=>g.k==='batido');return bG&&bG.t>0?Math.min(sg(s,'snack_pm','batido')/bG.t,1):1;}const bfD=bfDT(s)>0,aG=gs.filter(g=>g.k!=='batido'&&g.t>0&&!(g.k==='dairy'&&bfD));if(!aG.length)return 1;let d=0;aG.forEach(g=>d+=Math.min(sg(s,'snack_pm',g.k)/g.t,1));return d/aG.length;}const gs=getMG(m.id).filter(g=>g.t>0);if(!gs.length)return 0;let d=0;gs.forEach(g=>d+=Math.min(sg(s,m.id,g.k)/g.t,1));return d/gs.length;}
function pTot(){const t={carb:0,prot:0,fat:0,veg:0,fruit:0,dairy:0};MD.forEach(m=>getMG(m.id).forEach(g=>{const mk=gkn(g.k);if(t[mk]!=null)t[mk]+=g.t||0;}));return t}

function autoSave(s){const kcal=Math.round(cKcal(s)),totals=cTot(s),hasOverage=eOvr(s)&&eMac(s).kcal>0,date=new Date().toISOString().slice(0,10),hist=LS(V+'_h')||[];const idx=hist.findIndex(r=>r.date===date);const rec={date,kcal,totals,hasOverage};if(idx>=0)hist[idx]=rec;else hist.push(rec);LS(V+'_h',hist);}

let tab='today',openM={breakfast:true},openExt=true,draftM={},openSetup={};
function go(t){tab=t;['today','history','progress','setup'].forEach(x=>document.getElementById('nb-'+x)?.classList.toggle('on',x===t));render();}
function render(){apTh(getPlan().theme||'dark');const app=document.getElementById('app');if(tab==='today')app.innerHTML=bToday();else if(tab==='history'){app.innerHTML=bHistory();setTimeout(rCal,50);}else if(tab==='progress')app.innerHTML=bProgress();else app.innerHTML=bSetup();}
function patch(){
  if(tab!=='today')return;
  const s=getState(),pl=getPlan(),goal=pl.kcal||1582,kcal=cKcal(s),pct=Math.min(kcal/goal*100,100);
  const t=cTot(s),pt=pTot();
  const over=kcal>goal*1.05,near=kcal>goal*.88;
  const hc=over?'var(--red)':near?'var(--ora)':'var(--grn)';
  const Q=k=>document.querySelector('[data-'+k+']');
  const hk=Q('hk'),hb=Q('hb'),hp=Q('hp'),hr=Q('hr');
  if(hk){hk.textContent=Math.round(kcal);hk.style.color=hc;}
  if(hb){hb.style.width=pct.toFixed(1)+'%';hb.style.background=hc;}
  if(hp){hp.textContent=Math.round(pct)+'%';hp.style.color=hc;}
  if(hr)hr.textContent=Math.round(Math.max(0,goal-kcal))+' restantes';
  ['carb','prot','fat','fruit','veg','dairy'].forEach(k=>{
    const val=t[k]||0,tgt=pt[k]||0,done=val>=tgt&&tgt>0;
    const el=Q('sv-'+k),bar=Q('sb-'+k);
    if(el){if(el.childNodes[0])el.childNodes[0].textContent=val;el.style.color=done?'var(--acc)':val>0?'var(--t1)':'var(--t3)';}
    if(bar)bar.style.width=(tgt>0?Math.min(val/tgt,1)*100:0)+'%';
  });
  MD.forEach(m=>{
    const pr=mProg(m,s),pp=Math.round(pr*100),pc=pClr(pr);
    const bar=Q('mb-'+m.id),pe=Q('mp-'+m.id),me=Q('mm-'+m.id);
    if(bar){bar.style.width=pp+'%';bar.style.background=pc;}
    if(pe){pe.textContent=pp+'%';pe.style.color=pc;}
    if(me){const mm=getMM(m,s);me.innerHTML=mm.kcal>0?'<span style="color:'+pc+';font-weight:600">'+mm.kcal+' kcal</span>  <span style="color:var(--t3);font-size:12px">🌾'+mm.carb+'g · 🥩'+mm.prot+'g · 🥑'+mm.fat+'g</span>':'<span style="color:var(--t3)">Sin alimentos</span>';}
    if(openM[m.id]){const be=Q('mbody-'+m.id);if(be){let inner='';const hB=bfDT(s)>0;getMG(m.id).forEach(g=>{inner+=bGrp(m.id,g,s,hB);});be.innerHTML=inner||'<div style="padding:12px 16px;color:var(--t3);font-size:14px">Sin grupos configurados</div>';}}
  });
}

  const t=cTot(s),pt=pTot(),hB=bfDT(s)>0;
  const ds=new Date().toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});
  const over=kcal>goal*1.05,near=kcal>goal*.88;

function addFI(m,k){const s=getState();if(!s[m])s[m]={};if(!Array.isArray(s[m][k]))s[m][k]=[];s[m][k].push({fi:-1,p:0});saveS(s);render();}

function cFI(m,k,i,d){const s=getState();if(!Array.isArray(s[m]?.[k]))return;const items=s[m][k];if(items[i].fi<0)return;const gk=gkn(k),cap=mxM(s,m,gk),uo=items.reduce((a,it,j)=>j===i?a:it.fi>=0?a+(it.p||0):a,0),mi=cap-uo,cur=items[i].p||0;if(d>0)items[i].p=Math.min(cur+1,Math.max(cur,mi));else items[i].p=Math.max(1,cur-1);if(m==='snack_pm'){if(k==='batido'&&items[i].p>0){s.snack_pm.fruit=[];s.snack_pm.dairy=[];}else if((k==='fruit'||k==='dairy')&&items[i].p>0)s.snack_pm.batido=[];}saveS(s);patch();}

  let h='<div class="pe"><div style="padding:20px 16px 0"><div style="font-size:28px;font-weight:700;letter-spacing:-.5px">Historial</div></div>';

  h+='<div class="balc" onclick="togBal()">';
  h+='<div style="display:flex;align-items:center;gap:10px"><div style="flex:1"><div style="font-size:28px;font-weight:700;color:'+dC+'">'+dS+cum.toLocaleString()+'<span style="font-size:16px;font-weight:400"> kcal</span></div><div style="font-size:13px;color:var(--t3);margin-top:2px">Promedio '+avg+' kcal/día · '+hist.length+' días</div></div><span style="color:var(--t3)">'+(balOpen?'▲':'▼')+'</span></div>';
  if(balOpen){h+='<div class="balbody"><div class="trio"><div class="trioc"><div class="tlbl">Consumido</div><div class="tval">'+(cons/1000).toFixed(1)+'k</div></div><div class="trioc"><div class="tlbl">Objetivo</div><div class="tval" style="color:var(--t3)">'+(hist.length*goal/1000).toFixed(1)+'k</div></div><div class="trioc '+(cum>0?'ov':'un')+'"><div class="tlbl">Diferencia</div><div class="tval" style="color:'+dC+'">'+dS+cum+'</div></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="trioc"><div class="tlbl">En objetivo</div><div class="tval" style="color:var(--grn)">'+(hist.length-dOv)+'</div></div><div class="trioc"><div class="tlbl">Con exceso</div><div class="tval" style="color:var(--red)">'+dOv+'</div></div></div></div>';}
  h+='</div><div id="cal-outer"></div><div id="det-outer"></div></div>';return h;
}
function rCal(){
  const hm=hMap(),goal=getPlan().kcal||1582,Td=new Date(),todS=Td.getFullYear()+'-'+p2(Td.getMonth()+1)+'-'+p2(Td.getDate());
  function bGrid(y,m){let d2=new Date(y,m,1).getDay();d2=d2===0?6:d2-1;const dn=new Date(y,m+1,0).getDate();let g='<div class="cgrid">'+DOWS.map(d=>'<div class="cdow">'+d+'</div>').join('')+Array(d2).fill('<div></div>').join('');for(let d=1;d<=dn;d++){const ds=y+'-'+p2(m+1)+'-'+p2(d),rec=hm[ds];let cls='cday'+(rec?' hd':'')+(ds===todS?' tod':'')+(ds===cSel?' sel':'');let kEl='';if(rec){const diff=rec.kcal-goal;const col=diff>0?(Math.abs(diff)/goal>0.05?'var(--red)':'var(--ora)'):'var(--grn)';kEl='<div class="dk" style="color:'+col+'">'+rec.kcal+'</div>';}g+='<div class="'+cls+'" '+(rec?'onclick="pickDay(\''+ds+'\')" role="button"':'')+'>  <div class="dn">'+d+'</div>'+kEl+'</div>';}return g+'</div>';}
  function am(y,m,d){let nm=m+d,ny=y;while(nm<0){nm+=12;ny--;}while(nm>11){nm-=12;ny++;}return{y:ny,m:nm};}
  const pn=am(cY,cM,-1),nn=am(cY,cM,1);
  let pk='';
  if(pkOpen){const allDts=Object.keys(hm),minY=allDts.length?parseInt(allDts[0].slice(0,4)):cY-1;const yrs=[];for(let y=Math.min(minY,cY-2);y<=cY+1;y++)yrs.push(y);pk='<div class="pkbx"><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px">'+yrs.map(y=>'<button class="pkb '+(y===cY?'on':'')+'" onclick="pickY('+y+')">'+y+'</button>').join('')+'</div><div style="display:flex;gap:5px;flex-wrap:wrap">'+MONTHS.map((mn,i)=>'<button class="pkb '+(i===cM?'on':'')+'" onclick="pickMon('+i+')" style="flex:1;min-width:52px">'+mn.slice(0,3)+'</button>').join('')+'</div></div>';}
  const html=pk+'<div style="display:flex;align-items:center;gap:8px;padding:0 16px;margin-bottom:12px"><button class="ibt" onclick="calPrev()">◀</button><div style="font-size:17px;font-weight:600;flex:1;cursor:pointer" onclick="togPk()">'+MONTHS[cM]+' '+cY+' <span style="font-size:13px;color:var(--t3)">▼</span></div><button class="ibt" onclick="calNext()">▶</button></div><div class="cvp" id="cvp"><div class="ctr ntr" id="ctr" style="transform:translateX(-100%)"><div class="csl">'+bGrid(pn.y,pn.m)+'</div><div class="csl">'+bGrid(cY,cM)+'</div><div class="csl">'+bGrid(nn.y,nn.m)+'</div></div></div>';
  const outer=document.getElementById('cal-outer');
  if(outer){outer.innerHTML=html;requestAnimationFrame(()=>{setupCalSz();setupSw();});}
}
function setupCalSz(){const vp=document.getElementById('cvp'),tr=document.getElementById('ctr');if(!vp||!tr)return;const w=vp.offsetWidth;tr.querySelectorAll('.csl').forEach(s=>s.style.width=w+'px');tr.style.transform='translateX(-'+w+'px)';}
function setupSw(){const vp=document.getElementById('cvp');if(!vp||vp._sw)return;vp._sw=true;vp.addEventListener('touchstart',e=>{swX=e.touches[0].clientX;isSw=true;swD=0;document.getElementById('ctr')?.classList.add('ntr');},{passive:true});vp.addEventListener('touchmove',e=>{if(!isSw)return;swD=e.touches[0].clientX-swX;const tr=document.getElementById('ctr'),w=vp.offsetWidth;if(tr)tr.style.transform='translateX(calc(-'+w+'px + '+swD+'px))';},{passive:true});vp.addEventListener('touchend',()=>{if(!isSw)return;isSw=false;const tr=document.getElementById('ctr');tr?.classList.remove('ntr');if(swD<-50)navCal(1);else if(swD>50)navCal(-1);else{const w=document.getElementById('cvp')?.offsetWidth||0;if(tr)tr.style.transform='translateX(-'+w+'px)';}},{passive:true});}
function navCal(dir){const vp=document.getElementById('cvp'),tr=document.getElementById('ctr');if(!vp||!tr){chCal(dir);return;}const w=vp.offsetWidth,tx=dir>0?2*w:0;tr.classList.remove('ntr');tr.style.transform='translateX(-'+tx+'px)';tr.addEventListener('transitionend',()=>chCal(dir),{once:true});}
function chCal(dir){let m=cM+dir,y=cY;if(m<0){m=11;y--;}if(m>11){m=0;y++;}cM=m;cY=y;cSel=null;pkOpen=false;rCal();rDet();}

  [{e:'🌾',l:'Carbohidratos',k:'carb'},{e:'🥩',l:'Proteínas',k:'prot'},{e:'🥑',l:'Grasas',k:'fat'},{e:'🥦',l:'Vegetales',k:'veg'},{e:'🍎',l:'Frutas',k:'fruit'},{e:'🥛',l:'Lácteos',k:'dairy'}].forEach(g=>{const v=rec.totals?.[g.k]??0,t2=pt[g.k]||5,nc=v>t2?'var(--red)':v===t2?'var(--grn)':'var(--t3)';h+='<div class="prow"><div style="display:flex;align-items:center;gap:8px"><span>'+g.e+'</span><span style="font-size:14px;color:var(--t2)">'+g.l+'</span></div><span style="font-size:14px;font-weight:600;color:'+nc+'">'+v+'/'+t2+'</span></div>';});

  h+='</div></div>';

  if(ant.length){h+='<span class="slbl">Historial</span>';ant.slice().reverse().forEach(r=>{h+='<div style="background:var(--bg2);border-radius:var(--r2);padding:14px;margin:0 16px 8px"><div style="font-size:12px;color:var(--t3);margin-bottom:10px">'+new Date(r.date+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short',year:'numeric'})+'</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">';[['peso','kg','Peso'],['cin','cm','Cintura'],['gra','%','% Grasa'],['cad','cm','Cadera'],['bra','cm','Brazo'],['mus','cm','Muslo']].filter(([k])=>r[k]).forEach(([k,u,l])=>{h+='<div><div style="font-size:18px;font-weight:600">'+r[k]+u+'</div><div style="font-size:11px;color:var(--t3)">'+l+'</div></div>';});h+='</div></div>';});}

function saveAn(){const fields=[['peso','ap'],['cin','ac'],['cad','ad'],['bra','ab'],['mus','am'],['gra','ag']];const rec={date:new Date().toISOString().slice(0,10)};let has=false;fields.forEach(([k,id])=>{const v=parseFloat(document.getElementById(id)?.value);if(!isNaN(v)){rec[k]=v;has=true;}});if(!has)return alert('Ingresa al menos un valor');const ant=LS(V+'_an')||[];const idx=ant.findIndex(r=>r.date===rec.date);if(idx>=0)ant[idx]=rec;else ant.push(rec);LS(V+'_an',ant);render();}

function bSetup(){const pl=getPlan();draftM={};MD.forEach(m=>{draftM[m.id]=(pl.meals?.[m.id]||[]).map(g=>({...g}));});return rSetupHTML(pl);}

  const thOpts=['dark','light','system'].map(t=>{const lbs={dark:'🌙 Oscuro',light:'☀️ Claro',system:'💻 Sistema'};const on=(pl.theme||'dark')===t;return'<button onclick="setTh(\''+t+'\')" style="flex:1;padding:12px 4px;border:none;font-size:14px;font-weight:'+(on?'600':'400')+';color:'+(on?'var(--acc)':'var(--t3)')+';background:transparent;font-family:inherit;cursor:pointer;border-bottom:2px solid '+(on?'var(--acc)':'transparent')+'">'+lbs[t]+'</button>';}).join('');

    mBlks+='<div style="flex:1"><div style="font-size:16px;font-weight:600;color:var(--t1)">'+m.l+'</div>';

        mBlks+='<select id="addSel-'+m.id+'" style="flex:1;padding:8px 12px;border-radius:var(--r);border:1px solid var(--div);background:var(--s1);color:var(--t1);font-size:14px;font-family:inherit;appearance:none"><option value="">+ Añadir grupo…</option>'+addOpts+'</select>';

      }

go('today');
